services:
  db:
    image: postgres:16-alpine
    container_name: pharmaprice_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmaprice
      POSTGRES_PASSWORD: pharmaprice
      POSTGRES_DB: pharmaprice
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmaprice"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
